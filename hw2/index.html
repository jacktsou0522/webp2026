<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>資工選課表 - HW2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* CSS：模仿投影片中的綠色表格樣式 */
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            font-family: sans-serif;
        }
        th, td {
            border: 1px solid #e0e0e0;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #00b050; /* 投影片截圖的綠色 */
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f5f5f5;
        }
        .container {
            text-align: center;
            margin-top: 40px;
        }
        /* 讓課程名稱看起來可以點擊 */
        .popover-link {
            color: #000;
            text-decoration: none;
            cursor: pointer;
        }
        .popover-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>資工選課表</h2>
        
        <table id="csie">
            <thead>
                <tr>
                    <th>開課單位</th>
                    <th>課程名稱</th>
                    <th>授課教師</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>資工系</td>
                    <td>
                        <span class="popover-link" 
                              data-bs-toggle="popover" 
                              data-bs-trigger="click"
                              data-bs-html="true"
                              title="課程詳細資料" 
                              data-bs-content="學年/學期：114/2<br>開課序號：A2337<br>上課時間：星期五 09:10~12:00<br>地點：資工系電腦教室2">
                           物件導向軟體設計
                        </span>
                    </td>
                    <td>黃崇源</td>
                </tr>
                <tr>
                    <td>資工系</td>
                    <td>計算機網路實驗</td>
                    <td>李春良</td>
                </tr>
                <tr>
                    <td>資工系</td>
                    <td>作業系統實務</td>
                    <td>張哲維</td>
                </tr>
                <tr>
                    <td>資工系</td>
                    <td>生物統計</td>
                    <td>陳光武</td>
                </tr>
                <tr>
                    <td>資工系</td>
                    <td>通訊系統</td>
                    <td>陳仁暉</td>
                </tr>
                <tr>
                    <td>資工系</td>
                    <td>軟硬體專題(2)</td>
                    <td>魏志達</td>
                </tr>
            </tbody>
        </table>

        <button class="btn btn-outline-secondary mt-3" onclick="changeResult()">Change</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 1. 初始化 Bootstrap Popover
        document.addEventListener('DOMContentLoaded', function () {
            var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'))
            var popoverList = popoverTriggerList.map(function (popoverTriggerEl) {
                return new bootstrap.Popover(popoverTriggerEl)
            })
        });

        // 2. 實作點擊按鈕修改表格內容的函式 (changeResult)
        function changeResult() {
            var myTable = document.getElementById("csie");
            // 修改第一列（index 1）的第三個單元格（index 2）內容為 "李春良"
            if (myTable.rows.length > 1) {
                myTable.rows[1].cells[2].innerHTML = "李春良";
            }
        }
    </script>
</body>
</html>
