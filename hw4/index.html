<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>HW4 Ajax 分頁搜尋</title>

  <style>
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 15px;
    }

    th {
      background-color: #00a878;
      color: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    tr:nth-child(even) {
      background-color: #eeeeee;
    }

    button {
      margin-top: 10px;
      padding: 5px 10px;
    }

    input {
      margin-left: 20px;
      padding: 5px;
    }
  </style>
</head>

<body>
  <h1>
    景點觀光展覽資訊
    <input id="searchInput" type="text" oninput="searchData()">
  </h1>

  <table id="csie">
    <tr>
      <th>名稱</th>
      <th>地點</th>
      <th>票價</th>
    </tr>
  </table>

  <button onclick="prevPage()">上一頁</button>
  <span id="pageInfo">1 / 1 頁</span>
  <button onclick="nextPage()">下一頁</button>

  <script>
    let allData = [];
    let filteredData = [];
    let currentPage = 1;
    const pageSize = 10;

    const openUrl = "https://cloud.culture.tw/frontsite/trans/SearchShowAction.do?method=doFindTypeJ&category=6";

    function loadData() {
      const xhr = new XMLHttpRequest();

      xhr.open("GET", openUrl, true);
      xhr.send();

      xhr.onreadystatechange = function () {
        if (this.readyState === 4 && this.status === 200) {
          allData = JSON.parse(this.responseText);
          filteredData = allData;
          renderTable();
        }
      };
    }

    function renderTable() {
      const table = document.getElementById("csie");

      table.innerHTML = `
        <tr>
          <th>名稱</th>
          <th>地點</th>
          <th>票價</th>
        </tr>
      `;

      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageData = filteredData.slice(start, end);

      pageData.forEach(function (data) {
        const row = table.insertRow(-1);

        row.insertCell(0).innerHTML = data["title"];

        if (data["showInfo"] && data["showInfo"].length > 0) {
          row.insertCell(1).innerHTML = data["showInfo"][0]["location"];
          row.insertCell(2).innerHTML = data["showInfo"][0]["price"];
        } else {
          row.insertCell(1).innerHTML = "";
          row.insertCell(2).innerHTML = "";
        }
      });
        if (pageData.length === 0) {
            const row = table.insertRow(-1);
            const cell = row.insertCell(0);
            cell.colSpan = 3;
            cell.innerHTML = "查無資料";
            return;
        }

      updatePageInfo();
    }

    function updatePageInfo() {
      const totalPage = Math.ceil(filteredData.length / pageSize) || 1;
      document.getElementById("pageInfo").innerHTML = currentPage + " / " + totalPage + " 頁";
    }

    function nextPage() {
      const totalPage = Math.ceil(filteredData.length / pageSize) || 1;

      if (currentPage < totalPage) {
        currentPage++;
        renderTable();
      }
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderTable();
      }
    }

    function searchData() {
      const keyword = document.getElementById("searchInput").value;

      filteredData = allData.filter(function (data) {
        return data["title"].includes(keyword);
      });

      currentPage = 1;
      renderTable();
    }

    loadData();
  </script>
</body>
</html>
