<script>
    var openUrl = "https://cloud.culture.tw/frontsite/trans/SearchShowAction.do?method=doFindTypeJ&category=6";

    async function fetchData() {
        console.log("開始抓取資料...");
        try {
            const response = await fetch(openUrl);
            const data = await response.json();
            console.log("成功取得資料，數量：", data.length);

            var tableBody = document.getElementById('table-body');
            if (!tableBody) {
                console.error("找不到 table-body 元素！");
                return;
            }

            tableBody.innerHTML = ""; // 清空

            data.forEach((item, index) => {
                // 只取前 10 筆練習，避免網頁跑太久
                if (index < 10) {
                    var info = (item.showInfo && item.showInfo.length > 0) ? item.showInfo[0] : {};
                    
                    var row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.title}</td>
                        <td>${info.location || "無地點資訊"}</td>
                        <td>${info.price || "免費"}</td>
                    `;
                    tableBody.appendChild(row);
                }
            });
            console.log("表格渲染完成！");
        } catch (error) {
            console.error("發生錯誤了：", error);
            document.getElementById('table-body').innerHTML = '<tr><td colspan="3">資料載入失敗，請查看 Console 錯誤訊息</td></tr>';
        }
    }

    fetchData();
</script>
