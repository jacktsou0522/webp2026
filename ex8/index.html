<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex#8: Ajax 實作練習</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 1. 設定表頭為綠底白字 */
        #csie thead th {
            background-color: #04AA6D !important;
            color: white !important;
            border-color: #04AA6D !important;
        }

        /* 2. 強制灰白相間的效果 (針對奇數行) */
        #csie.table-striped tbody tr:nth-of-type(odd) {
            background-color: #999 !important; 
        }

        /* 3. 確保偶數行是純白色 */
        #csie.table-striped tbody tr:nth-of-type(even) {
            background-color: #fff !important;
        }

        h1 {
            margin-top: 30px;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>

</head>
<body class="container">

    <h1 class="text-center">景點觀光展覽資訊</h1>

    <table id="csie" class="table table-striped table-bordered mt-4">
        <thead>
            <tr>
                <th>名稱</th>
                <th>地點</th>
                <th>票價</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="text-center mt-4 mb-5">
        <button class="btn btn-danger" onclick="deloldData()">deloldData</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
